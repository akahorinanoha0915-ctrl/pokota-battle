<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぽこたんバトル⚔️</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1a2e;--panel:#16213e;--card:#0f3460;--border:#533483;
  --green:#4ecca3;--gold:#f5a623;--red:#e94560;--blue:#5b9cf6;
  --text:#eaeaea;--muted:#8888aa;
}
body{background:var(--bg);font-family:'DotGothic16',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ─── SCREENS ─── */
.screen{display:none;width:100%;max-width:480px;min-height:100vh;flex-direction:column;align-items:center;padding:16px;gap:12px;}
.screen.active{display:flex;}

/* ─── COMMON ─── */
.logo{font-size:clamp(1.8rem,7vw,2.6rem);color:var(--gold);text-shadow:0 0 20px rgba(245,166,35,.5);text-align:center;margin-top:16px;}
.logo em{color:var(--red);font-style:normal;}
.panel{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:16px;width:100%;}
.panel-title{color:var(--gold);font-size:.85rem;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
input[type=text]{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'DotGothic16',monospace;font-size:.9rem;padding:10px 12px;outline:none;margin-bottom:8px;}
input[type=text]:last-child{margin-bottom:0;}
input[type=text]:focus{border-color:var(--green);}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'DotGothic16',monospace;font-size:.88rem;padding:12px 20px;width:100%;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);opacity:.75;}
.btn-green{background:var(--green);color:#0d1a15;font-weight:bold;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-muted{background:#333355;color:var(--text);}
.btn-row{display:flex;gap:8px;width:100%;}
.btn-row .btn{flex:1;}
.msg{font-size:.75rem;color:var(--muted);text-align:center;}
.msg.error{color:var(--red);}
.room-code{font-size:3rem;letter-spacing:10px;color:var(--green);text-align:center;text-shadow:0 0 20px rgba(78,204,163,.4);padding:16px 0;}
.dots::after{content:'...';animation:dotAnim 1.2s steps(4,end) infinite;}
@keyframes dotAnim{0%,100%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ═══════════════════════════════
   BATTLE SCREEN
═══════════════════════════════ */
#screenBattle{padding:0;max-width:480px;min-height:100vh;display:none;flex-direction:column;background:var(--bg);}
#screenBattle.active{display:flex;}

/* FIELD */
.battle-field{
  position:relative;width:100%;height:54vw;max-height:260px;min-height:210px;overflow:hidden;
  background:linear-gradient(180deg,#1a0a3a 0%,#2a1060 45%,#1a3a10 45%,#0d2008 100%);
}
/* platforms */
.battle-field::before,.battle-field::after{
  content:'';position:absolute;border-radius:50%;
}
.battle-field::before{/* enemy platform */
  width:160px;height:50px;background:#1e4a10;border:2px solid #0d2808;
  right:-10px;top:42%;
}
.battle-field::after{/* player platform */
  width:175px;height:55px;background:#1e4a10;border:2px solid #0d2808;
  left:-10px;bottom:8%;
}

/* status panels */
.status-panel{
  position:absolute;background:rgba(10,8,30,.9);border:2px solid rgba(160,140,220,.35);
  border-radius:8px;padding:7px 10px;z-index:5;
}
.status-enemy{top:8px;left:8px;min-width:170px;}
.status-player{bottom:8px;right:8px;min-width:185px;}
.s-name{font-size:.78rem;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:6px;}
.s-lv{font-size:.65rem;color:var(--muted);}
.hp-row{display:flex;align-items:center;gap:4px;margin-top:5px;}
.hp-label{font-size:.65rem;color:var(--gold);width:16px;}
.hp-track{flex:1;height:7px;background:#222;border-radius:4px;overflow:hidden;}
.hp-fill{height:100%;border-radius:4px;background:var(--green);transition:width .5s ease,background .3s;}
.hp-nums{font-size:.62rem;color:var(--muted);min-width:46px;text-align:right;}
.exp-row{display:flex;align-items:center;gap:4px;margin-top:4px;}
.exp-label{font-size:.58rem;color:var(--blue);width:24px;}
.exp-track{flex:1;height:5px;background:#222;border-radius:4px;overflow:hidden;}
.exp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#a855f7);transition:width .5s ease;}

/* sprites */
.sprite{position:absolute;image-rendering:pixelated;}
.sprite-enemy{width:88px;height:88px;right:24px;top:calc(42% - 78px);transform:scaleX(-1);}
.sprite-player{width:88px;height:88px;left:24px;bottom:calc(8% + 14px);}

/* ACTION BOX */
.action-box{flex:1;background:var(--panel);border-top:3px solid var(--border);display:flex;flex-direction:column;padding:10px 12px;gap:8px;min-height:190px;}
.battle-msg{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.8rem;color:var(--text);min-height:44px;line-height:1.7;}

/* WAZA GRID */
.waza-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.waza-btn{
  background:var(--card);border:2px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DotGothic16',monospace;font-size:.76rem;
  padding:9px 6px;cursor:pointer;text-align:center;line-height:1.5;
  transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.waza-btn:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px);}
.waza-btn:disabled{opacity:.3;cursor:not-allowed;}
.waza-btn.selected{border-color:var(--green);background:rgba(78,204,163,.12);}
.waza-btn.locked{border-style:dashed;}
.w-icon{font-size:1.2rem;}
.w-name{color:var(--gold);font-size:.7rem;}
.w-desc{color:var(--muted);font-size:.56rem;}
.waza-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.waza-hdr span{font-size:.75rem;color:var(--gold);}
.waza-timer{font-size:.8rem;color:var(--red);font-weight:bold;}

/* QUESTION */
.q-waza-row{font-size:.62rem;color:var(--muted);text-align:center;}
.q-word{font-size:clamp(1.8rem,8vw,2.8rem);color:#fff;text-align:center;letter-spacing:3px;text-shadow:0 0 20px rgba(78,204,163,.3);padding:2px 0;}
.timer-wrap{background:#1a1a30;border-radius:99px;height:7px;overflow:hidden;margin:3px 0;}
.timer-fill{height:100%;border-radius:99px;background:var(--green);transition:width .1s linear,background .3s;}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.choice-btn{
  border:none;border-radius:10px;color:#fff;
  font-family:'DotGothic16',monospace;font-size:.84rem;
  padding:13px 8px;cursor:pointer;transition:opacity .1s,transform .08s;
  text-shadow:0 1px 2px rgba(0,0,0,.4);font-weight:bold;
}
.choice-btn:nth-child(1){background:#c0392b;}
.choice-btn:nth-child(2){background:#c47c1a;}
.choice-btn:nth-child(3){background:#1e8a4a;}
.choice-btn:nth-child(4){background:#1a5fa0;}
.choice-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
.choice-btn:disabled{cursor:not-allowed;}
.choice-btn.correct{outline:3px solid var(--green);opacity:1 !important;}
.choice-btn.wrong{opacity:.25 !important;}
.choice-btn.dimmed{opacity:.35;}
.choice-btn.locked-out{opacity:.4 !important;}

/* RESULT */
.result-title{font-size:2.4rem;text-align:center;margin-top:28px;}
.result-win{color:var(--gold);text-shadow:0 0 30px rgba(245,166,35,.5);}
.result-lose{color:var(--red);text-shadow:0 0 30px rgba(233,69,96,.5);}

/* DAMAGE FLASH */
.dmg-flash{position:fixed;inset:0;pointer-events:none;border:0px solid transparent;z-index:100;transition:border .05s;}
.dmg-flash.hit{border:8px solid rgba(233,69,96,.65);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.shake{animation:shake .3s ease;}
</style>
</head>
<body>
<div class="dmg-flash" id="dmgFlash"></div>

<!-- ═══ TITLE ═══ -->
<div class="screen active" id="screenTitle">
  <div class="logo">⚔️ぽこたん<em>バトル</em>⚔️</div>
  <canvas id="titleCanvas" width="24" height="24"
    style="image-rendering:pixelated;width:96px;height:96px;border:2px solid #533483;border-radius:10px;background:#0a0a16;margin:4px auto"></canvas>
  <div class="panel">
    <div class="panel-title">👤 なまえをいれよう</div>
    <input type="text" id="inputName" placeholder="ぷれいやーなまえ" maxlength="10">
  </div>
  <div class="panel">
    <div class="panel-title">🔥 Firebase せってい</div>
    <input type="text" id="inputFbUrl" placeholder="Database URL (https://xxx.firebaseio.com)">
    <input type="text" id="inputFbApiKey" placeholder="API Key">
    <div class="msg" style="margin-top:4px">※ <a href="https://console.firebase.google.com" target="_blank" style="color:var(--blue)">console.firebase.google.com</a></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="createRoom()">🏠 へやをつくる</button>
    <button class="btn btn-blue"  onclick="showJoin()">🚪 へやにはいる</button>
  </div>
  <div id="msgTitle" class="msg"></div>
</div>

<!-- ═══ JOIN ═══ -->
<div class="screen" id="screenJoin">
  <div class="logo" style="font-size:1.5rem;margin-top:20px">🚪 へやにはいる</div>
  <div class="panel">
    <div class="panel-title">へやコードをいれよう</div>
    <input type="text" id="inputRoomCode" placeholder="4けたのコード" maxlength="4"
      style="font-size:2rem;text-align:center;letter-spacing:8px">
  </div>
  <div class="btn-row">
    <button class="btn btn-muted" style="flex:0;width:auto;padding:12px 16px" onclick="showScreen('screenTitle')">← もどる</button>
    <button class="btn btn-green" onclick="joinRoom()">はいる！</button>
  </div>
  <div id="msgJoin" class="msg"></div>
</div>

<!-- ═══ WAITING ═══ -->
<div class="screen" id="screenWaiting">
  <div class="logo" style="font-size:1.5rem;margin-top:20px">🏠 へやをつくったよ！</div>
  <div class="panel" style="text-align:center">
    <div class="panel-title">ともだちにこのコードをおしえよう</div>
    <div class="room-code" id="displayRoomCode">----</div>
    <div class="msg">4けたのへやコード</div>
  </div>
  <div class="panel"><div class="msg">ともだちがくるのをまってるよ<span class="dots"></span></div></div>
  <button class="btn btn-muted" onclick="cancelRoom()">キャンセル</button>
</div>

<!-- ═══ BATTLE ═══ -->
<div class="screen" id="screenBattle">
  <div class="battle-field">
    <!-- 敵ステータス（左上） -->
    <div class="status-panel status-enemy">
      <div class="s-name"><span id="enemyName">てき</span><span class="s-lv" id="enemyLv">LV.1</span></div>
      <div class="hp-row">
        <span class="hp-label">HP</span>
        <div class="hp-track"><div class="hp-fill" id="enemyHpFill" style="width:100%"></div></div>
      </div>
    </div>
    <!-- 敵スプライト（右上） -->
    <canvas class="sprite sprite-enemy" id="enemyCanvas" width="24" height="24"></canvas>
    <!-- 自スプライト（左下） -->
    <canvas class="sprite sprite-player" id="playerCanvas" width="24" height="24"></canvas>
    <!-- 自ステータス（右下） -->
    <div class="status-panel status-player">
      <div class="s-name"><span id="playerName">あなた</span><span class="s-lv" id="playerLv">LV.1</span></div>
      <div class="hp-row">
        <span class="hp-label">HP</span>
        <div class="hp-track"><div class="hp-fill" id="playerHpFill" style="width:100%"></div></div>
        <span class="hp-nums" id="playerHpNums">100/100</span>
      </div>
      <div class="exp-row">
        <span class="exp-label">EXP</span>
        <div class="exp-track"><div class="exp-fill" id="expFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- アクションボックス -->
  <div class="action-box">
    <div class="battle-msg" id="battleMsg">バトルかいし！</div>

    <!-- わざ選択 -->
    <div id="phaseWaza" style="display:none">
      <div class="waza-hdr">
        <span>⚔️ わざをえらぼう！</span>
        <span class="waza-timer" id="wazaCountdown">5</span>
      </div>
      <div class="waza-grid" id="wazaGrid"></div>
    </div>

    <!-- 問題 -->
    <div id="phaseQuestion" style="display:none">
      <div class="q-waza-row" id="qWazaRow"></div>
      <div class="q-word" id="qWord">---</div>
      <div class="timer-wrap"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      <div class="choices-grid" id="choicesGrid"></div>
    </div>

    <!-- 待機 -->
    <div id="phaseWait" style="display:none">
      <div class="msg" style="padding:8px 0">あいてのこうどうをまってるよ<span class="dots"></span></div>
    </div>
  </div>
</div>

<!-- ═══ RESULT ═══ -->
<div class="screen" id="screenResult">
  <div class="result-title" id="resultTitle">WIN!</div>
  <canvas id="resultCanvas" width="24" height="24"
    style="image-rendering:pixelated;width:120px;height:120px;border:2px solid #533483;border-radius:10px;background:#0a0a16;margin:8px auto"></canvas>
  <div class="panel" style="text-align:center">
    <div id="resultMsg" style="font-size:.85rem;line-height:1.9"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="playAgain()">もういちど！</button>
    <button class="btn btn-muted" onclick="goTitle()">タイトルへ</button>
  </div>
</div>

// ═══════════════════════════
//  STATE
// ═══════════════════════════
let db=null,roomId=null,mySlot=null,myName='',roomRef=null;
let listeners=[];
const MAX_HP=100;
let state={p1:{name:'',hp:MAX_HP,lv:1,exp:0},p2:{name:'',hp:MAX_HP,lv:1,exp:0},phase:'waiting',turn:'p1',waza:{p1:null,p2:null},question:null,roundResult:null,winner:null};
let timerIv=null,wazaIv=null;
let myWazaDone=false,answerBusy=false,roundOwner=false;

// ═══════════════════════════
//  FIREBASE
// ═══════════════════════════
function initFb(){
  const url=document.getElementById('inputFbUrl').value.trim();
  const key=document.getElementById('inputFbApiKey').value.trim();
  if(!url||!key)return false;
  try{if(!firebase.apps.length)firebase.initializeApp({apiKey:key,databaseURL:url});db=firebase.database();return true;}
  catch(e){console.error(e);return false;}
}
function genCode(){return String(Math.floor(1000+Math.random()*9000));}

// ═══════════════════════════
//  ROOM
// ═══════════════════════════
async function createRoom(){
  const name=document.getElementById('inputName').value.trim();
  if(!name)return setMsg('Title','なまえをいれてね！','error');
  if(!initFb())return setMsg('Title','FirebaseのURLとAPIKeyをいれてね！','error');
  myName=name;mySlot='p1';roomId=genCode();
  document.getElementById('displayRoomCode').textContent=roomId;
  roomRef=db.ref('rooms/'+roomId);
  await roomRef.set({p1:{name,hp:MAX_HP,lv:1,exp:0},p2:{name:'',hp:MAX_HP,lv:1,exp:0},phase:'waiting',turn:'p1',waza:{p1:null,p2:null},question:null,roundResult:null,winner:null,createdAt:Date.now()});
  showScreen('screenWaiting');
  roomRef.on('value',snap=>{
    const d=snap.val();
    if(d&&d.p2&&d.p2.name&&d.phase==='waza'){roomRef.off('value');state=d;startBattle();}
  });
}

async function joinRoom(){
  const name=document.getElementById('inputName').value.trim();
  const code=document.getElementById('inputRoomCode').value.trim();
  if(!name)return setMsg('Join','なまえをいれてね！','error');
  if(code.length!==4)return setMsg('Join','4けたのコードをいれてね','error');
  if(!db&&!initFb())return setMsg('Join','FirebaseのURLとAPIKeyをいれてね！','error');
  myName=name;mySlot='p2';roomId=code;
  roomRef=db.ref('rooms/'+roomId);
  const snap=await roomRef.once('value');const d=snap.val();
  if(!d)return setMsg('Join','そのへやはないよ','error');
  if(d.p2&&d.p2.name)return setMsg('Join','そのへやはもういっぱいだよ','error');
  await roomRef.update({'p2/name':name,phase:'waza'});
  const s2=await roomRef.once('value');state=s2.val();
  startBattle();
}

async function cancelRoom(){if(roomRef)await roomRef.remove();showScreen('screenTitle');}

function showJoin(){
  const name=document.getElementById('inputName').value.trim();
  if(!name)return setMsg('Title','なまえをいれてね！','error');
  if(!initFb())return setMsg('Title','FirebaseのURLとAPIKeyをいれてね！','error');
  showScreen('screenJoin');
}

// ═══════════════════════════
//  BATTLE
// ═══════════════════════════
function myS(){return state[mySlot];}
function enSlot(){return mySlot==='p1'?'p2':'p1';}
function enS(){return state[enSlot()];}
function isTurn(){return state.turn===mySlot;}

function startBattle(){
  showScreen('screenBattle');
  updateUI();
  listenRoom();
  startWazaPhase();
  log('バトルかいし！ さきにせいかいしたほうのかち！🔥');
}

function listenRoom(){
  listeners.forEach(f=>f());listeners=[];
  const h=roomRef.on('value',snap=>{
    const d=snap.val();if(!d)return;
    const prev=state.phase;
    state=d;
    updateUI();
    if(d.winner){endBattle(d.winner);return;}
    if(d.phase==='waza'&&prev!=='waza')startWazaPhase();
    if(d.phase==='question'&&prev!=='question')showQuestion(d.question);
    if(d.phase==='roundEnd'&&prev!=='roundEnd')onRoundEnd(d.roundResult);
    // 相手がわざを選んだら → ターンプレイヤーが問題を生成
    if(d.phase==='waza'&&myWazaDone&&d.waza&&d.waza[enSlot()]&&isTurn())tryGenQuestion();
  });
  listeners.push(()=>roomRef.off('value',h));
}

// ─── WAZA PHASE ───
function startWazaPhase(){
  myWazaDone=false;answerBusy=false;roundOwner=false;
  clearInterval(timerIv);clearInterval(wazaIv);
  hidePhases();
  document.getElementById('phaseWaza').style.display='';
  renderWaza();
  let cnt=5;document.getElementById('wazaCountdown').textContent=cnt;
  wazaIv=setInterval(()=>{
    cnt--;
    document.getElementById('wazaCountdown').textContent=cnt;
    if(cnt<=0){clearInterval(wazaIv);if(!myWazaDone)pickWaza('normal');}
  },1000);
}

function renderWaza(){
  const g=document.getElementById('wazaGrid');g.innerHTML='';
  const lv=myS().lv;
  WAZA.forEach(w=>{
    const locked=lv<w.unlockLv;
    const b=document.createElement('button');
    b.className='waza-btn'+(locked?' locked':'');
    b.disabled=locked;
    b.innerHTML=`<span class="w-icon">${w.icon}</span><span class="w-name">${w.name}</span><span class="w-desc">${locked?`LV${w.unlockLv}でかいほう`:w.desc}</span>`;
    if(!locked)b.onclick=()=>pickWaza(w.id);
    g.appendChild(b);
  });
}

async function pickWaza(wid){
  if(myWazaDone)return;
  myWazaDone=true;clearInterval(wazaIv);
  document.querySelectorAll('.waza-btn').forEach(b=>b.disabled=true);
  const idx=WAZA.findIndex(w=>w.id===wid);
  if(idx>=0)document.querySelectorAll('.waza-btn')[idx]?.classList.add('selected');
  const w=WAZA.find(x=>x.id===wid)||WAZA[0];
  log(`${myName}は ${w.icon}${w.name} をえらんだ！`);
  await roomRef.update({[`waza/${mySlot}`]:wid});
  // 相手がすでに選んでいれば問題を生成（ターンプレイヤーのみ）
  const snap=await roomRef.once('value');const d=snap.val();
  if(d.waza&&d.waza[enSlot()]&&isTurn()){
    tryGenQuestion();
  } else {
    hidePhases();
    document.getElementById('phaseWait').style.display='';
    log('あいてのわざせんたくをまっているよ…');
  }
}

async function tryGenQuestion(){
  const snap=await roomRef.once('value');const d=snap.val();
  if(d.phase!=='waza')return;
  if(!d.waza||!d.waza.p1||!d.waza.p2)return;
  const q=makeQ();
  await roomRef.update({phase:'question',question:q,roundResult:null});
}

function makeQ(){
  const lv=Math.max(myS().lv,enS().lv);
  let pool=[];
  CATEGORIES.forEach(cat=>{if(lv>=cat.minLv)pool=pool.concat(cat.words);});
  if(!pool.length)pool=CATEGORIES[0].words;
  const word=pool[Math.floor(Math.random()*pool.length)];
  const all=[];CATEGORIES.forEach(cat=>all.push(...cat.words));
  const wrongs=all.filter(w=>w.jp!==word.jp).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.jp);
  return{en:word.en,answer:word.jp,choices:[...wrongs,word.jp].sort(()=>Math.random()-.5),startedAt:Date.now()};
}

// ─── QUESTION PHASE ───
function showQuestion(q){
  if(!q)return;
  clearInterval(timerIv);
  hidePhases();
  document.getElementById('phaseQuestion').style.display='';
  document.getElementById('qWord').textContent=q.en;
  const mw=WAZA.find(x=>x.id===state.waza[mySlot])||WAZA[0];
  const ew=WAZA.find(x=>x.id===state.waza[enSlot()])||WAZA[0];
  document.getElementById('qWazaRow').textContent=`あなた: ${mw.icon}${mw.name}  あいて: ${ew.icon}${ew.name}`;
  // choices
  const g=document.getElementById('choicesGrid');g.innerHTML='';
  q.choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='choice-btn';b.textContent=ch;
    b.onclick=()=>onAnswer(ch,q);
    g.appendChild(b);
  });
  // timer (speed waza → +5s)
  const mw2=WAZA.find(x=>x.id===state.waza[mySlot])||WAZA[0];
  const totalTime=mw2.id==='speed'?20:15;
  let left=totalTime;
  const fill=document.getElementById('timerFill');
  fill.style.width='100%';fill.style.background='var(--green)';
  timerIv=setInterval(()=>{
    left-=0.1;
    const pct=Math.max(0,(left/totalTime)*100);
    fill.style.width=pct+'%';
    if(pct<25)fill.style.background='var(--red)';
    else if(pct<55)fill.style.background='var(--gold)';
    if(left<=0){clearInterval(timerIv);onTimeout(q);}
  },100);
  answerBusy=false;
}

async function onAnswer(chosen,q){
  if(answerBusy)return;
  const correct=chosen===q.answer;
  // visual
  document.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===q.answer)b.classList.add('correct');
    else if(b.textContent===chosen&&!correct)b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  if(!correct){
    // 誤答: -5HP、2秒ロック
    answerBusy=true;
    document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
    const newHp=Math.max(0,myS().hp-5);
    await roomRef.update({[`${mySlot}/hp`]:newHp});
    log(`❌ ${myName}まちがい！ じぶんに5ダメージ！`);
    flashMe();
    if(newHp<=0){await roomRef.update({winner:enSlot(),phase:'ended'});return;}
    setTimeout(()=>{
      if(state.phase!=='question'){return;}
      answerBusy=false;
      document.querySelectorAll('.choice-btn').forEach(b=>{
        b.disabled=false;
        b.classList.remove('correct','wrong','dimmed','locked-out');
      });
    },2000);
    return;
  }

  // 正解！ → トランザクションで先取り
  answerBusy=true;
  clearInterval(timerIv);
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

  const mw=WAZA.find(x=>x.id===state.waza[mySlot])||WAZA[0];
  const ew=WAZA.find(x=>x.id===state.waza[enSlot()])||WAZA[0];
  let dmg=mw.dmg;
  if(ew.id==='barrier')dmg=Math.floor(dmg/2);

  const res=await roomRef.child('roundResult').transaction(cur=>{
    if(cur!==null)return;// すでに先取りされている
    return{winner:mySlot,damage:dmg,loser:enSlot()};
  });

  if(res.committed){
    // 私が先取り → ダメージ適用してラウンド終了
    roundOwner=true;
    log(`✅ ${myName}せいかい！ あいてに${dmg}ダメージ！`);
    const newEnHp=Math.max(0,enS().hp-dmg);
    let exp=myS().exp+3,lv=myS().lv;
    while(exp>=expNeeded(lv)&&lv<100){exp-=expNeeded(lv);lv++;}
    const won=newEnHp<=0;
    await roomRef.update({
      [`${enSlot()}/hp`]:newEnHp,
      [`${mySlot}/exp`]:exp,
      [`${mySlot}/lv`]:lv,
      phase:won?'ended':'roundEnd',
      winner:won?mySlot:null,
      turn:enSlot(),
    });
    if(won)log(`🏆 ${myName}のかち！`);
    else{
      // 2秒後に次ラウンドへ
      setTimeout(()=>nextRound(),2000);
    }
  } else {
    log(`💨 ${myName}せいかい！でも あいてのほうがはやかった…`);
  }
}

async function onTimeout(q){
  if(answerBusy&&!roundOwner)return;// 既に誰かが処理中
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  // タイムアウト: 両者-10HP。ターンプレイヤーが書き込む
  if(!isTurn())return;
  const newMyHp=Math.max(0,myS().hp-10);
  const newEnHp=Math.max(0,enS().hp-10);
  flashMe();
  log('⏰ じかんぎれ！ りょうしゃに10ダメージ！');
  const won=newEnHp<=0?mySlot:newMyHp<=0?enSlot():null;
  await roomRef.update({
    [`${mySlot}/hp`]:newMyHp,
    [`${enSlot()}/hp`]:newEnHp,
    phase:won?'ended':'roundEnd',
    winner:won||null,
    turn:enSlot(),
    roundResult:{winner:null,damage:10,loser:null},
  });
  if(!won)setTimeout(()=>nextRound(),2000);
}

function onRoundEnd(result){
  if(roundOwner)return;// roundOwner側がすでにnextRoundを予約済み
  // 負けた側も2秒待って次へ（ターンが変わるので次はこちらが問題を出す）
  // UIの更新はlistenerが担当
}

async function nextRound(){
  const snap=await roomRef.once('value');
  if(snap.val()&&snap.val().winner)return;
  await roomRef.update({phase:'waza','waza/p1':null,'waza/p2':null,question:null,roundResult:null});
}

// ─── UI UPDATE ───
function updateUI(){
  const my=myS(),en=enS();
  document.getElementById('playerName').textContent=my.name||myName;
  document.getElementById('enemyName').textContent=en.name||'？？？';
  document.getElementById('playerLv').textContent=`LV.${my.lv} ${stageForLv(my.lv)}`;
  document.getElementById('enemyLv').textContent=`LV.${en.lv} ${stageForLv(en.lv)}`;
  document.getElementById('playerHpNums').textContent=`${my.hp}/${MAX_HP}`;
  setHp('playerHpFill',(my.hp/MAX_HP)*100);
  setHp('enemyHpFill',(en.hp/MAX_HP)*100);
  const need=expNeeded(my.lv);
  document.getElementById('expFill').style.width=((my.exp/need)*100)+'%';
  drawForLv(document.getElementById('playerCanvas'),my.lv);
  drawForLv(document.getElementById('enemyCanvas'),en.lv);
}

function setHp(id,pct){
  const el=document.getElementById(id);
  el.style.width=pct+'%';
  el.style.background=pct>50?'var(--green)':pct>25?'var(--gold)':'var(--red)';
}

function hidePhases(){
  ['phaseWaza','phaseQuestion','phaseWait'].forEach(id=>document.getElementById(id).style.display='none');
}

function log(msg){document.getElementById('battleMsg').textContent=msg;}

function flashMe(){
  const f=document.getElementById('dmgFlash');f.classList.add('hit');
  document.getElementById('statusPlayer').classList.add('shake');
  setTimeout(()=>{f.classList.remove('hit');document.getElementById('statusPlayer').classList.remove('shake');},350);
}

function expNeeded(lv){return Math.min(10+lv*2,50);}

// ─── RESULT ───
function endBattle(ws){
  clearInterval(timerIv);clearInterval(wazaIv);
  listeners.forEach(f=>f());
  const won=ws===mySlot;
  showScreen('screenResult');
  const t=document.getElementById('resultTitle');
  t.textContent=won?'🎉 WIN！':'💀 LOSE…';
  t.className='result-title '+(won?'result-win':'result-lose');
  drawForLv(document.getElementById('resultCanvas'),myS().lv);
  document.getElementById('resultMsg').innerHTML=
    won?`すごい！${myName}のかち！<br>LV.${myS().lv} 「${stageForLv(myS().lv)}」`
       :`つぎはかつぞ！<br>またちょうせんしよう！`;
}

async function playAgain(){if(roomRef)await roomRef.remove();showScreen('screenTitle');}
function goTitle(){if(roomRef)roomRef.remove();showScreen('screenTitle');}

// ─── SCREEN ───
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setMsg(scr,msg,type=''){const el=document.getElementById('msg'+scr);if(!el)return;el.textContent=msg;el.className='msg '+type;}

// init
drawHiyoko(document.getElementById('titleCanvas'));
</script>
